# Application
spring.application.name=Backend-Braiding

# Server
server.port=${PORT:8080}

#Database - Postgresql
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/braiding}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:your_db_password}
spring.datasource.driver-class-name=org.postgresql.Driver

 
# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.default_batch_fetch_size=50
spring.jpa.properties.hibernate.packagesToScan=model
spring.jpa.properties.packagesToScan=model

# JWT Configuration
jwt.secret=${JWT_SECRET:your_jwt_secret_key_min_256_bits}
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# Stripe API Keys
stripe.api.key=${STRIPE_SECRET_KEY:sk_test_your_stripe_secret_key_here}
stripe.publishable.key=${STRIPE_PUBLISHABLE_KEY:pk_test_your_stripe_publishable_key_here}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:whsec_your_webhook_secret_here}
stripe.reconciliation.interval-ms=${STRIPE_RECONCILIATION_INTERVAL_MS:300000}
booking.rate-limit.requests-per-minute=${BOOKING_RATE_LIMIT_PER_MINUTE:20}

# Email Configuration (Gmail example)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${EMAIL_PASSWORD:your-app-specific-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# CORS
cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*,https://hair-braiding-coral.vercel.app}

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

# Vonage (Nexmo) SMS Configuration
vonage.api.key=${VONAGE_API_KEY:your_vonage_api_key}
vonage.api.secret=${VONAGE_API_SECRET:your_vonage_api_secret}
vonage.phone.number=${VONAGE_PHONE_NUMBER:your_vonage_phone_number}
